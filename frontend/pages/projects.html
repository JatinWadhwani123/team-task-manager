<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content=
"width=device-width,
initial-scale=1.0"
/>

<title>
Projects
</title>

<link
rel="stylesheet"
href=
"../css/projects.css"
/>

<link
href=
"https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
/>

<link
rel="stylesheet"
href=
"../css/toast.css"
/>
</head>

<body>

<div
class="mission-loader"
id="projectsLoader"
role="status"
aria-live="polite"
>
  <div class="mission-card">
    <div class="mission-radar" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <p class="mission-label">Loading mission board</p>
    <h2>Scanning your projects</h2>
    <p id="projectsLoaderMessage">
      Locating active project zones...
    </p>
    <div class="mission-progress" aria-hidden="true">
      <div></div>
    </div>
    <div class="mission-badges" aria-hidden="true">
      <span>Projects</span>
      <span>Members</span>
      <span>Status</span>
    </div>
  </div>
</div>

<div class="container">

<!-- Sidebar -->
<aside class="sidebar">

<h2>
TaskFlow Pro
</h2>

<ul>

<li onclick=
"goDashboard()">
Dashboard
</li>

<li class=
"active">
Projects
</li>

<li onclick=
"goTasks()">
Tasks
</li>

<li id=
"logoutBtn">
Logout
</li>

</ul>

</aside>

<!-- Main -->
<main class=
"main-content">

<div class=
"top-bar">

<div>
<h1>
Projects
</h1>
</div>

<div class="page-actions">
<button id=
"openModalBtn">
+ Create Project
</button>
<div id="profileMount"></div>
</div>

</div>

<!-- Projects Grid -->
<div
id=
"projectsContainer"
class=
"projects-grid">
</div>

</main>

</div>

<!-- Create Project Modal -->

<div
class="modal"
id="projectModal"
>

<div class=
"modal-content">

<h2>
Create Project
</h2>

<input
type="text"
id="projectName"
placeholder=
"Project Name"
/>

<textarea
id=
"projectDescription"
placeholder=
"Project Description"
></textarea>

<button id=
"saveProject">
Save Project
</button>

</div>
</div>

<!-- Add Member Modal -->

<div
class="modal"
id="memberModal"
style="display:none"
>

<div class=
"modal-content">

<h2>
Add Member
</h2>

<input
type="email"
id="memberEmail"
placeholder=
"Enter member email"
/>

<button id=
"addMemberBtn">
Add Member
</button>

</div>
</div>
<div class=
"toast-container"
id=
"toastContainer">
</div>
<script src=
"../js/toast.js">
</script>
<script src=
"../js/profile.js">
</script>
<script src=
"../js/projects.js">
</script>

</body>
</html>
