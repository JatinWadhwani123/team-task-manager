<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Login</title>

  <link
    rel="stylesheet"
    href="../css/auth.css"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>

<body>

<div class="auth-container">

  <div class="left-panel">
    <h1>
      Welcome Back
    </h1>

    <p>
      Login and continue
      managing projects.
    </p>
  </div>

  <div class="right-panel">

    <form id="loginForm">

      <h2>Login</h2>

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      />

      <button type="submit">
        Login
      </button>

      <p>
        Don't have an account?
        <a href="./signup.html">
          Signup
        </a>
      </p>

    </form>

  </div>

</div>
<script src="../js/api.js"></script>
<script src="../js/login.js"></script>


</body>
</html>
