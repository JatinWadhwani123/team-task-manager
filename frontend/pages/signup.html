<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Signup</title>

  <link
    rel="stylesheet"
    href="../css/auth.css"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>

<body>

<div class="auth-container">

  <div class="left-panel">
    <h1>
      Welcome to
      TaskFlow Pro
    </h1>

    <p>
      Manage your projects
      smarter with team
      collaboration.
    </p>
  </div>

  <div class="right-panel">

    <form id="signupForm">

      <h2>Create Account</h2>

      <input
        type="text"
        id="name"
        placeholder="Full Name"
        required
      />

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      />

      <button type="submit">
        Sign Up
      </button>

      <p>
        Already have an account?
        <a href="./login.html">
          Login
        </a>
      </p>

    </form>

  </div>

</div>

<script src="../js/auth.js"></script>

</body>
</html>
